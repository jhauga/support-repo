<!doctype html>
<html>
<head>
 <meta charset="utf-8">
 <title>Pipes &amp; Footlights</title>
 
 <!--<script src="/js/scripts.js"></script>-->
 <link rel="icon" href="/favicon.png">
 
 <style>
  body {
   margin-left: 50px;
  }
  div, nav, ul, li, a {
   display: inline-block;
   position: relative;
   box-sizing: border-box;
  }
  div, nav, footer {
   width: 100%;
  }
  nav {
   background: black;   
   height: 60px;
  }
  nav ul li a {
   color: white;
   padding: 10px;
  }
  main {
   margin: 30px;
  }
  button {
   background: darkslategray;
   color: white;     
   margin: 10px;
   padding: 15px;
   cursor: pointer;
   border-radius: 10px;
  }
  button.showHide {
   display: block; 
   background: black;
   color: white;
  }
  button.showHide.black {
   display: block; 
   padding: 2px;
  }  
  button.showHide.gray {
   display: block; 
   background: darkslategray;
   padding: 2px;
  }    
  span.key {
   color: #0073e6;
  }  
  span.str {
   color: orange;
  }
  span.int {
   color: green;
  }
  span.mthd {
   color: purple;
  }
  em {
   color: dimgray;
  }  
  footer {
   bottom: 0px;   
   background: black;
   color: white;
   margin-left: -50px; 
   padding: 50px;
  }
 </style>
</head>

<body>

  <div id="content" class="markdown-body" style="opacity:0;transition:opacity 0.8s ease;"></div>

  <!--
    This button is not merely an element in the DOM.
    It is the stage manager — the one who knocks twice before the curtain rises.
    Click it once and `musical` steps into the light; `stage` follows close behind.
    Neither exits with a non-zero code tonight.
  -->
  <button id="curtain-btn" style="display:block;margin:30px auto;" onclick="raiseTheCurtain()">
    &#127917; Raise the Curtain
  </button>

  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script>
    // The story waits offstage — a flat file with grand ambitions.
    // fetch() steps into the spotlight and retrieves it asynchronously,
    // so the page loads fast and the narrative arrives when it's ready.
    let storyMarkdown = '';
    fetch('cmd-musical-stage.md')
      .then(function(response) { return response.text(); })
      .then(function(text) { storyMarkdown = text; })
      .catch(function() { storyMarkdown = ''; });

    // ┌──────────────────────────────────────────────────────────────┐
    // │  raiseTheCurtain()                                           │
    // │                                                              │
    // │  The houselights dim. marked.js converts the raw script     │
    // │  into rendered HTML, scene by scene. The #content div       │
    // │  fades in — a slow dissolve, not a hard cut — and the       │
    // │  button disappears once its single dramatic purpose is done. │
    // │                                                              │
    // │  If the story hasn't loaded yet, the curtain stays down.    │
    // └──────────────────────────────────────────────────────────────┘
    function raiseTheCurtain() {
      if (!storyMarkdown) {
        console.warn('musical: the story has not loaded yet — the curtain is still down');
        return;
      }

      var content = document.getElementById('content');

      // Parse markdown — `musical` finally gets its rendered debut.
      content.innerHTML = marked.parse(storyMarkdown);

      // Animate each top-level block in sequence, like acts taking the stage.
      var blocks = content.children;
      var delay = 0;
      for (var i = 0; i < blocks.length; i++) {
        (function(el, d) {
          el.style.opacity = '0';
          el.style.transition = 'opacity 0.6s ease';
          setTimeout(function() { el.style.opacity = '1'; }, d);
        })(blocks[i], delay);
        delay += 300;
      }

      // Fade the container in as the first act begins.
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          content.style.opacity = '1';
        });
      });

      // Every great entrance is one-way — the button takes its bow and exits.
      document.getElementById('curtain-btn').style.display = 'none';
    }
  </script>


</body>
</html>
