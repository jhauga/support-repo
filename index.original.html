<!doctype html>
<html>
<head>
 <!-- Required meta tags -->
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
 <title>Multi Lang Coder</title>
 <link rel="icon" href="/favicon.png">
 <!-- using bottstrap -->
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
 <!-- user style -->
 <style>
  body {
   margin-left: 3em;
  }
  .results {
   width: 500px;
  }
  .search {
   display: inline;
   width: 500px;
  }
 </style>

<body>
 <h1>Search Movie</h1>
 <p>Search For Movie</p>
 <hr>
 <div class="form-group">
  <!-- Set number of results -->
  <div class="form-group results">
   <label for="numberOfResults">Number of Results</label>
   <select id="numberOfResults" name="numberOfResults" 
           class="form-control form-control-sm">
     <option>1</option>
     <option>2</option>
     <option>3</option>
     <option>4</option>
     <option>5</option>
   </select>
  </div>
  <div class="form-group search">
   <label>Search Movie or TV Show by Title</label>
   <div class="row">
    <div class="col">
     <!-- input for search -->
     <input id="searchInput" class="form-control search" type="search" placeholder="Input title">
     <!-- Search using api key -->
     <button class="btn btn-primary"
             onClick="runSearch()">Search</button>
    </div>
   </div>
  </div>
 </div>
 <hr>
 <div id="results" style="display: none">
  <div class="card" style="width: 18rem;">
   <img src="..." class="card-img-top" alt="...">
   <div class="card-body">
     <h5 class="card-title">Card title</h5>
     <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
     <a href="#" class="btn btn-primary">Go somewhere</a>
   </div>
  </div>
  <!-- pagination for results -->
  <nav aria-label="...">
   <ul class="pagination">
    <li class="page-item disabled">
     <a class="page-link" href="#" tabindex="-1" aria-disabled="true">Previous</a>
    </li>
    <li class="page-item active" aria-current="page">
     <a class="page-link" href="#">1 <span class="sr-only">(current)</span></a>
    </li>
    <!-- 
    let num = 2;    
    page-item = <li class="page-item"><a class="page-link" href="#">num</a></li>
    let countCards =  api.totalResults;
    let resetCount = 1;
    let total = get(numberOfResults.value);
    while (num < countCards) {
     if (resetCount >= countCards) {
      resetCount = 0;
      copy page-item .
     }
     num++;
    }
    -->
    <li class="page-item">
     <a class="page-link" href="#">Next</a>
    </li>
   </ul>
  </nav>
 </div>
 <!-- call to return stylish results -->
 <script>
  var numberOfResults = document.getElementById("numberOfResults"); /* number of cards per pagination */
  var results = document.getElementById("results"); /* cards */  
  var searchInput = document.getElementById("searchInput"); /* what to search */
  var apiCall = "http://www.omdbapi.com/?apikey=99387a0f&s=";
 
  // Function to create card for each result object
  function createStylishMovieCards(json) {
   /* inline function to fill new card with data */
   var newCard = (i, j) => {
    if (i != 0) cardWrap[j].appendElement("beforeend", card[i]);
    card[i].querySelector(".card-title")[0].innerHTML = item.Title;
    card[i].querySelector(".card-text")[0].innerHTML = `
     <dl>
      <dt>Year</dt>: <dd>${item.Year}</dd>
      <dt>imdbID</dt>: <dd>${item.imdbID}</dd>
      <dt>Type</dt>: <dd>${item.Type}</dd>
     </dl>`;
    card[i].querySelector(".card-img-top")[0].src = item.Poster;
   };
   if json.Response eq false:
    let card = document.getElementsByClassName("card");
    move card[0].img[0] card[0].svg;
    card[0].svg.innerHTML = `
     <g id="frownyFace">
      <g id="eyes">
       <path>draw("o")</path><path>draw("o")</path>
      </g>
      <g id="frown">
       <path style="transform: rotate(180)">draw("u")</path>
      </g>
     </g>`;
    card[0].querySelector(".card-title")[0].innerHTML = "404";
    card[0].querySelector(".card-text")[0].innerHTML = 
    "No results found for " + searchInput.value;
   else:
    let cardIndex = 0;
    let cardWrapIndex = 0;
    let searchResults = json.totalResults;
    let cardWrap = `<div class="card-wrapper"></div>`;
    /* for each object in search object array create new card */
    foreach item in json.Search do (
     let cardCount = 0;
     let countCards = numberOfResults.value;
     let resetCount = 1;
     while (cardCoount < searchResults) {
      if cardIndex eq 0:
       touch cardWrap[cardWrapIndex]
       carWrapIndex++;
       move card[0] cardWarp[cardWrapIndex];
       newCard(cardIndex, cardWrapIndex);
      else:
       copy card[0] card[cardIndex];
       newCard(cardIndex, cardWrapIndex);
      cardIndex++;
      if (resetCount >= countCards) {
       cardWrapIndex++;
       copy cardWrap[0] cardWarp[cardWrapIndex];
      }
     }
    );
  }

  // onClick function for search button
  function runSearch() {
   let data;
   if (searchInput.value.length >= 1) {
    results.style.display = "";
    apiCall = apiCall + searchInput.value.replaceAll(" ", "+");
    let xhttp = new XMLHttpRequest();
    xhttp.onreadystatechange = () => {
     if (this.status == 200 && this.readyState == 4) {
      data = ()=> { return `curl ${apiCall}`; };
      createStylishMovieCards(JSON.stringify(data));
     }
    };
    xhttp.open("GET", apiCall, true);
    xhttp.send();
   }
  }
 </script>
</body>
</html>
