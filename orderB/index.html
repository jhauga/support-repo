<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Parts - TypeScript Web App</title>
  <link href="../favicon.png" rel="icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --secondary-color: #64748b;
      --success-color: #10b981;
      --error-color: #ef4444;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --bg-light: #f8fafc;
      --bg-white: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      color: var(--text-primary);
      background-color: var(--bg-light);
      line-height: 1.6;
    }

    .header {
      background-color: var(--bg-white);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .ts-badge {
      display: inline-block;
      background-color: #3178c6;
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      border-radius: 0.25rem;
      vertical-align: middle;
      margin-left: 0.4rem;
      letter-spacing: 0.05em;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 2rem;
    }

    .nav-links a {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      transition: all 0.2s;
    }

    .nav-links a:hover, .nav-links a.active {
      background-color: var(--bg-light);
      color: var(--primary-color);
    }

    .main {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      width: 100%;
    }

    .page-container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .page-description {
      color: var(--text-secondary);
      font-size: 1.125rem;
      margin-bottom: 2rem;
    }

    .order-form {
      background-color: var(--bg-white);
      border-radius: 0.75rem;
      padding: 2rem;
      box-shadow: var(--shadow-md);
    }

    .form-section {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
    }

    .form-section:last-of-type {
      border-bottom: none;
    }

    .form-section h2 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--primary-color);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .required {
      color: var(--error-color);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-group input.error,
    .form-group textarea.error,
    .form-group select.error {
      border-color: var(--error-color);
    }

    .error-message {
      display: block;
      color: var(--error-color);
      font-size: 0.875rem;
      margin-top: 0.375rem;
    }

    .form-hint {
      display: block;
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-top: 0.375rem;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 2rem;
    }

    .btn {
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background-color: var(--primary-hover);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background-color: var(--secondary-color);
      color: white;
    }

    .btn-secondary:hover:not(:disabled) {
      background-color: #475569;
    }

    .alert {
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 2rem;
    }

    .alert-success {
      background-color: #d1fae5;
      color: #065f46;
      border: 1px solid #10b981;
    }

    .alert-success strong {
      display: block;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React and ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone (includes TypeScript + React presets) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Register a TSX preset so TypeScript generics inside JSX are parsed correctly -->
  <script>
    Babel.registerPreset('tsx', {
      presets: [
        [Babel.availablePresets['typescript'], { allExtensions: true, isTSX: true }],
        [Babel.availablePresets['react']],
        [Babel.availablePresets['env']],
      ],
    });
  </script>

  <script type="text/babel" data-presets="tsx">
    // ── TypeScript type definitions ────────────────────────────────────────────

    interface OrderFormData {
      customerName: string;
      email: string;
      companyName: string;
      partNumber: string;
      partDescription: string;
      quantity: number;
      urgency: 'standard' | 'expedited' | 'rush';
      deliveryAddress: string;
      additionalNotes: string;
    }

    type FormErrors = Partial<Record<keyof OrderFormData, string>>;
    type FormStatus = 'idle' | 'submitting' | 'success';

    // ── Initial form state ─────────────────────────────────────────────────────

    const initialFormData: OrderFormData = {
      customerName: '',
      email: '',
      companyName: '',
      partNumber: '',
      partDescription: '',
      quantity: 1,
      urgency: 'standard',
      deliveryAddress: '',
      additionalNotes: '',
    };

    // ── Component ──────────────────────────────────────────────────────────────

    const { useState } = React;

    function App(): JSX.Element {
      const [formData, setFormData] = useState<OrderFormData>(initialFormData);
      const [errors, setErrors] = useState<FormErrors>({});
      const [status, setStatus] = useState<FormStatus>('idle');
      const [orderId, setOrderId] = useState<string>('');

      const validateForm = (): boolean => {
        const newErrors: FormErrors = {};

        if (!formData.customerName.trim()) {
          newErrors.customerName = 'Customer name is required';
        }

        if (!formData.email.trim()) {
          newErrors.email = 'Email is required';
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
          newErrors.email = 'Email is invalid';
        }

        if (!formData.partNumber.trim()) {
          newErrors.partNumber = 'Part number is required';
        }

        if (formData.quantity < 1) {
          newErrors.quantity = 'Quantity must be at least 1';
        }

        if (!formData.deliveryAddress.trim()) {
          newErrors.deliveryAddress = 'Delivery address is required';
        }

        setErrors(newErrors);
        return Object.keys(newErrors).length === 0;
      };

      const handleSubmit = (e: React.FormEvent<HTMLFormElement>): void => {
        e.preventDefault();

        if (!validateForm()) {
          return;
        }

        setStatus('submitting');

        setTimeout((): void => {
          const mockOrderId: string = `ORD-${Date.now()}`;
          setOrderId(mockOrderId);
          setStatus('success');
          console.log('Order submitted:', { ...formData, orderId: mockOrderId });
        }, 1500);
      };

      const handleChange = (
        e: React.ChangeEvent<HTMLInputElement | HTMLTextAreaElement | HTMLSelectElement>
      ): void => {
        const { name, value, type } = e.target;

        setFormData((prev: OrderFormData): OrderFormData => ({
          ...prev,
          [name]: type === 'number' ? Number(value) : value,
        }));

        if (errors[name as keyof OrderFormData]) {
          setErrors((prev: FormErrors): FormErrors => {
            const updated = { ...prev };
            delete updated[name as keyof OrderFormData];
            return updated;
          });
        }
      };

      const handleReset = (): void => {
        setFormData(initialFormData);
        setErrors({});
        setStatus('idle');
        setOrderId('');
      };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
          <header className="header">
            <nav className="nav">
              <h1 className="logo">
                Type-Safe Web App <span className="ts-badge">TS</span>
              </h1>
              <ul className="nav-links">
                <li><a href="../index.html">← Gallery</a></li>
                <li><a href="index.html" className="active">Order Parts</a></li>
                <li><a href="contact.html">Contact Support</a></li>
              </ul>
            </nav>
          </header>

          <main className="main">
            <div className="page-container">
              <h1>Order Parts</h1>
              <p className="page-description">
                Fill out the form below to order parts from our manufacturing facility.
                All fields marked with * are required.
              </p>

              {status === 'success' && (
                <div className="alert alert-success">
                  <strong>✓ Order Submitted Successfully!</strong>
                  Your order ID is: <strong>{orderId}</strong>
                  <br />
                  We'll process your order and contact you shortly.
                </div>
              )}

              <form className="order-form" onSubmit={handleSubmit}>
                <div className="form-section">
                  <h2>Customer Information</h2>

                  <div className="form-group">
                    <label htmlFor="customerName">
                      Customer Name <span className="required">*</span>
                    </label>
                    <input
                      type="text"
                      id="customerName"
                      name="customerName"
                      value={formData.customerName}
                      onChange={handleChange}
                      className={errors.customerName ? 'error' : ''}
                      disabled={status === 'submitting' || status === 'success'}
                    />
                    {errors.customerName && (
                      <span className="error-message">{errors.customerName}</span>
                    )}
                  </div>

                  <div className="form-group">
                    <label htmlFor="email">
                      Email Address <span className="required">*</span>
                    </label>
                    <input
                      type="email"
                      id="email"
                      name="email"
                      value={formData.email}
                      onChange={handleChange}
                      className={errors.email ? 'error' : ''}
                      disabled={status === 'submitting' || status === 'success'}
                    />
                    {errors.email && (
                      <span className="error-message">{errors.email}</span>
                    )}
                  </div>

                  <div className="form-group">
                    <label htmlFor="companyName">Company Name</label>
                    <input
                      type="text"
                      id="companyName"
                      name="companyName"
                      value={formData.companyName}
                      onChange={handleChange}
                      disabled={status === 'submitting' || status === 'success'}
                    />
                  </div>
                </div>

                <div className="form-section">
                  <h2>Part Details</h2>

                  <div className="form-group">
                    <label htmlFor="partNumber">
                      Part Number <span className="required">*</span>
                    </label>
                    <input
                      type="text"
                      id="partNumber"
                      name="partNumber"
                      value={formData.partNumber}
                      onChange={handleChange}
                      placeholder="e.g., PN-12345"
                      className={errors.partNumber ? 'error' : ''}
                      disabled={status === 'submitting' || status === 'success'}
                    />
                    {errors.partNumber && (
                      <span className="error-message">{errors.partNumber}</span>
                    )}
                  </div>

                  <div className="form-group">
                    <label htmlFor="partDescription">Part Description</label>
                    <textarea
                      id="partDescription"
                      name="partDescription"
                      value={formData.partDescription}
                      onChange={handleChange}
                      rows={3}
                      placeholder="Brief description of the part"
                      disabled={status === 'submitting' || status === 'success'}
                    />
                  </div>

                  <div className="form-group">
                    <label htmlFor="quantity">
                      Quantity <span className="required">*</span>
                    </label>
                    <input
                      type="number"
                      id="quantity"
                      name="quantity"
                      value={formData.quantity}
                      onChange={handleChange}
                      min={1}
                      className={errors.quantity ? 'error' : ''}
                      disabled={status === 'submitting' || status === 'success'}
                    />
                    {errors.quantity && (
                      <span className="error-message">{errors.quantity}</span>
                    )}
                  </div>

                  <div className="form-group">
                    <label htmlFor="urgency">Urgency Level</label>
                    <select
                      id="urgency"
                      name="urgency"
                      value={formData.urgency}
                      onChange={handleChange}
                      disabled={status === 'submitting' || status === 'success'}
                    >
                      <option value="standard">Standard (5-7 business days)</option>
                      <option value="expedited">Expedited (2-3 business days)</option>
                      <option value="rush">Rush (24 hours)</option>
                    </select>
                  </div>
                </div>

                <div className="form-section">
                  <h2>Delivery Information</h2>

                  <div className="form-group">
                    <label htmlFor="deliveryAddress">
                      Delivery Address <span className="required">*</span>
                    </label>
                    <textarea
                      id="deliveryAddress"
                      name="deliveryAddress"
                      value={formData.deliveryAddress}
                      onChange={handleChange}
                      rows={4}
                      placeholder="Street address, city, state, ZIP code"
                      className={errors.deliveryAddress ? 'error' : ''}
                      disabled={status === 'submitting' || status === 'success'}
                    />
                    {errors.deliveryAddress && (
                      <span className="error-message">{errors.deliveryAddress}</span>
                    )}
                  </div>

                  <div className="form-group">
                    <label htmlFor="additionalNotes">Additional Notes</label>
                    <textarea
                      id="additionalNotes"
                      name="additionalNotes"
                      value={formData.additionalNotes}
                      onChange={handleChange}
                      rows={3}
                      placeholder="Any special instructions or requirements"
                      disabled={status === 'submitting' || status === 'success'}
                    />
                  </div>
                </div>

                <div className="form-actions">
                  <button
                    type="button"
                    className="btn btn-secondary"
                    onClick={handleReset}
                    disabled={status === 'submitting'}
                  >
                    {status === 'success' ? 'New Order' : 'Reset Form'}
                  </button>
                  <button
                    type="submit"
                    className="btn btn-primary"
                    disabled={status === 'submitting' || status === 'success'}
                  >
                    {status === 'submitting' ? 'Submitting...' : 'Submit Order'}
                  </button>
                </div>
              </form>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root') as HTMLElement);
    root.render(<App />);
  </script>
</body>
</html>
